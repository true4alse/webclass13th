<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자바스크립트 기초</title>
</head>
<body>
    <script>
        // 자바스크립트 언어만 사용 가능한 영역
        console.log("ㅋㅋㅋ")
        console.log("반갑습니다. 정현진님")

        "정현진"
        '김현아'
        // `김하경`
        "정"+"현"+"진" // "정현진"
        console.log("웹디정선생".length) 
        console.log("정"+"현"+"진")
        console.log("웹디정선생"[0]+"웹디정선생"[1]) // "웹"
        "he's a doctor"

        console.log((100+20)/10)
        console.log(10%3)
        console.log(10**2)

        console.log(5+"정현진")
        console.log("웹디정선생"[2]+"민"+100)
        console.log((100+"웹디정선생".length)*3)
        console.log(("정현진"[0]+"웹디정선생"[1]).length+10)
        console.log((10 ** 2 + 3) % 7)

    </script>
</body>
</html>
