<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Screen Serif Marquee</title>
    <link rel="stylesheet" href="css/study3.css">
</head>
<body>
    <main class="marquee" aria-label="프론트엔드 키워드 마키 애니메이션">
        <div class="marquee__track">
            <p class="marquee__content">
                <span>Creative</span><i aria-hidden="true">✦</i>
                <span>Frontend</span><i aria-hidden="true">✦</i>
                <span>Experience</span><i aria-hidden="true">✦</i>
            </p>
            <p class="marquee__content" aria-hidden="true">
                <span>Creative</span><i aria-hidden="true">✦</i>
                <span>Frontend</span><i aria-hidden="true">✦</i>
                <span>Experience</span><i aria-hidden="true">✦</i>
            </p>
        </div>
    </main>
</body>
</html>
