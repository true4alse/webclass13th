<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>표 태그</title>
</head>
<body>
    <table border="1">
        <caption>대표시간표</caption>
        <tr>
            <th></th>
            <th>월</th>
            <th>화</th>
            <th>수</th>
            <th>목</th>
            <th>금</th>
        </tr>
        <tr>
            <th>오전</th>
            <td rowspan="2">출근</td>
            <td>외근</td>
            <td>휴무</td>
            <td colspan="2">출근</td>
            
        </tr>
        <tr>
            <th>오후</th>
           
            <td>플렉스타임</td>
            <td>휴무</td>
            <td>출근</td>
            <td>반차</td>
        </tr>
    </table>
</body>
</html>
