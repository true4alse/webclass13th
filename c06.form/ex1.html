<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예제</title>
</head>
<body>
    <h1>CREATE YOUR ACCOUNT</h1>
    <form action="#">
        <div>
            <label for="user-email">Email Address</label>
            <input type="text" id="user-email" name="user-email">
        </div>
        <div>
            <label for="confirm-address">Confirm your Address</label>
            <input type="text" id="confirm-address" name="confirm-address">
        </div>
        <div>
            <label for="residence">Country of Residence</label>
            <select name="residence" id="residence">
                <option value="Aland Islands">Aland Islands</option>
                <option value="Bahamas">Bahamas</option>
                <option value="China">China</option>
                <option value="Denmark">Denmark</option>
                <option value="Egypt">Egypt</option>
                <option value="France">France</option>
                <option value="United Kingdom">United Kingdom</option>
                <option value="Korea, Republic of" selected>Korea, Republic of</option>
            </select>
        </div>
        <div>
            <input type="checkbox" id="agree" name="agree">
            <label for="agree">I am 13 years of age or older and agree to the terms of the <i>Steam Subscriber Agreement</i> and the <i>Valve Privacy Policy.</i></label>
        </div>
        <button type="submit">Continue</button>
    </form>
</body>
</html>
